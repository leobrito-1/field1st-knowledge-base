# Schema for wiki entries — used by the /wiki skill for validation
required:
  - project
  - repo
  - date
  - author
  - tags
  - answers

# These are required for PR-triggered entries but optional for /wiki capture
pr_required:
  - pr
  - branch

optional:
  - jira
  - packages
  - related
  - files

types:
  project: string
  repo: string
  pr: number
  branch: string
  date: date
  author: string
  jira: string
  tags: string[]
  answers: string[]
  packages: string[]
  related: string[]
  files: string[]

sections:
  required:
    - The problem
    - What we did
    - Why this way and not another
    - What we learned
    - Technical reference
  optional:
    - What we tried that didn't work
